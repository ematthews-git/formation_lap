[project]
name = "formation-sim"
version = "0.1.0"
description = "F1 pre-race strategy simulator (generation · Monte-Carlo · selection)"
requires-python = ">=3.12"
dependencies = [
    "fastf1>=3.4.0",
    "pandas>=2.0",
    "numpy>=1.26",
    "scipy>=1.11",
    "pyyaml>=6.0",
]

[project.scripts]
formation-sim = "formation_sim.run:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/formation_sim"]
