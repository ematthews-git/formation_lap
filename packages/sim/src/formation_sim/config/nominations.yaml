# Sources: official Pirelli press releases (press.pirelli.com "Tyre compound choices"
# announcements per season/batch), cross-checked against Formula1.com tyre previews.
# Only circuits present in the training data (data/manifest.json) are listed; a missing
# entry simply means "no translation" (label-keyed behaviour unchanged).
#
# Circuit keys match the FastF1 event Location AFTER normalisation (schema.normalize_circuit).
# NOTE 2021 Spielberg is round 8 (the STYRIAN GP, C2/C3/C4), not the Austrian GP a week
# later (C3/C4/C5) — only the Styrian race passed the dry-race filter that year.
# NOTE the 2026 compounds are a new generation (C1-C5, no C6); cross-year translation
# uses same-circuit nomination DIFFS, which stay meaningful across the generation change.

