[project]
name = "formation-data"
version = "0.1.0"
description = "Collects all data for the Formation Lap site"
requires-python = ">=3.12"
dependencies = [
    "psycopg2-binary>=2.9.12",
    "sqlalchemy>=2.0.50",
    "fastf1>=3.4.0",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "pydantic>=2.0",
    "pandas>=2.0",
    "numpy>=1.26",
    "formation-sim",
]

[project.scripts]
formation-data = "formation_data.cli:main"

[tool.uv.sources]
formation-sim = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/formation_data"]
