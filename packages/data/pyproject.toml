[project]
name = "formation-data"
version = "0.1.0"
description = "Collects all data for the Formation Lap site"
requires-python = ">=3.12"
dependencies = [
    "psycopg2-binary>=2.9.12",
    "sqlalchemy>=2.0.50",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/formation_data"]
