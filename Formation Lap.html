document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"text-align:right\">PTS<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ drivers }}\" as=\"dr\" hint-placeholder-count=\"10\">\n          <div style=\"display:grid;grid-template-columns:34px 1fr 116px 96px 60px 74px;align-items:center;padding:11px 18px 11px 0;border-bottom:1px solid #2A2724;position:relative\" style-hover=\"background:#272523\">\n            <span style=\"position:absolute;left:0;top:0;bottom:0;width:2px;background:{{ dr.color }}\"><\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8C8884;padding-left:18px\">{{ dr.posLabel }}<\u002Fspan>\n            <span style=\"font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:21px;color:#F1EEEB;text-transform:uppercase;letter-spacing:.01em\">{{ dr.name }}<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#A6A29E\">{{ dr.team }}<\u002Fspan>\n            <span style=\"display:flex;justify-content:center\">\n              <svg width=\"84\" height=\"26\" viewBox=\"0 0 84 26\" style=\"overflow:visible\"><polyline points=\"{{ dr.spark }}\" fill=\"none\" stroke=\"{{ dr.sparkColor }}\" stroke-width=\"1.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline><circle cx=\"{{ dr.lastX }}\" cy=\"{{ dr.lastY }}\" r=\"2\" fill=\"{{ dr.color }}\"><\u002Fcircle><\u002Fsvg>\n            <\u002Fspan>\n            <span style=\"text-align:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#BBB7B3;font-weight:500\">{{ dr.last }}<\u002Fspan>\n            <span style=\"text-align:right;padding-right:18px;font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:23px;color:#F1EEEB;font-variant-numeric:tabular-nums\">{{ dr.pts }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- circuit history -->\n      <div style=\"display:flex;flex-direction:column;gap:22px\">\n        <div style=\"border:1px solid #3C3A36;background:#1E1D1C\">\n          <div style=\"padding:10px 16px;border-bottom:1px solid #36332F;background:#2A2928\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#B4B0AB;font-weight:600\">LEGACY_ARCHIVE <span style=\"color:#5C5854\">//<\u002Fspan> SILVERSTONE<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #2A2724\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8C8884;width:34px\">’25<\u002Fspan><span style=\"width:8px;height:8px;background:#E07F2A;flex:none\"><\u002Fspan><span style=\"font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:19px;color:#F1EEEB;text-transform:uppercase;flex:1\">L. Norris<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8C8884\">McLaren<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #2A2724\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8C8884;width:34px\">’24<\u002Fspan><span style=\"width:8px;height:8px;background:#3FB0A0;flex:none\"><\u002Fspan><span style=\"font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:19px;color:#F1EEEB;text-transform:uppercase;flex:1\">L. Hamilton<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8C8884\">Mercedes<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #2A2724\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8C8884;width:34px\">’23<\u002Fspan><span style=\"width:8px;height:8px;background:#4674AE;flex:none\"><\u002Fspan><span style=\"font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:19px;color:#F1EEEB;text-transform:uppercase;flex:1\">M. Verstappen<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8C8884\">Red Bull<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #2A2724\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8C8884;width:34px\">’22<\u002Fspan><span style=\"width:8px;height:8px;background:#C5343C;flex:none\"><\u002Fspan><span style=\"font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:19px;color:#F1EEEB;text-transform:uppercase;flex:1\">C. Sainz<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8C8884\">Ferrari<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;padding:11px 18px\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8C8884;width:34px\">’21<\u002Fspan><span style=\"width:8px;height:8px;background:#3FB0A0;flex:none\"><\u002Fspan><span style=\"font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:19px;color:#F1EEEB;text-transform:uppercase;flex:1\">L. Hamilton<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8C8884\">Mercedes<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #3C3A36;background:#1E1D1C;padding:18px 20px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;color:#827E7A;margin-bottom:8px\">POLE CONVERTED TO WIN<\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:10px\">\n            <span style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:60px;line-height:.82;color:#F1EEEB\">43<span style=\"font-size:28px;color:#8C8884\">%<\u002Fspan><\u002Fspan>\n            <span style=\"font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;color:#A6A29E;line-height:1.4\">of the time here<br><span style=\"color:#827E7A\">last 14 editions<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ KEY STORYLINES ============ -->\n    <section style=\"border-top:1px solid #403D38;padding-top:22px\">\n      <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:16px\">\n        <span style=\"width:3px;height:14px;background:#C13A40;display:inline-block\"><\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;color:#ECE9E6;font-weight:600\">EDITORIAL_INSIGHT <span style=\"color:#5C5854\">//<\u002Fspan> BRIEFING<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px\">\n        <div style=\"border:1px solid #3C3A36;background:#1E1D1C;padding:20px\">\n          <div style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:15px;color:#6C6864;margin-bottom:10px\">01<\u002Fdiv>\n          <h3 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:25px;line-height:1;color:#F1EEEB;text-transform:uppercase;margin-bottom:8px\">Eleven points, one home crowd<\u002Fh3>\n          <p style=\"font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;line-height:1.55;color:#A6A29E;text-wrap:pretty\">Norris leads Verstappen by 11 with the title fight razor-thin — and 140,000 Brits willing him on.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #3C3A36;background:#1E1D1C;padding:20px\">\n          <div style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:15px;color:#6C6864;margin-bottom:10px\">02<\u002Fdiv>\n          <h3 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:25px;line-height:1;color:#F1EEEB;text-transform:uppercase;margin-bottom:8px\">Ferrari’s floor gamble<\u002Fh3>\n          <p style=\"font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;line-height:1.55;color:#A6A29E;text-wrap:pretty\">A new floor debuts Friday. Leclerc needs Silverstone’s fast corners to validate the direction.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #3C3A36;background:#1E1D1C;padding:20px\">\n          <div style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:15px;color:#6C6864;margin-bottom:10px\">03<\u002Fdiv>\n          <h3 style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:25px;line-height:1;color:#F1EEEB;text-transform:uppercase;margin-bottom:8px\">Rain roulette at 15:30<\u002Fh3>\n          <p style=\"font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;line-height:1.55;color:#A6A29E;text-wrap:pretty\">A 42% shower peak mid-race could rewrite every stop and reward whoever gambles on the crossover.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- footer -->\n    <div style=\"display:flex;justify-content:space-between;align-items:center;padding-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:#5C5854\">\n      <span>FORMATION LAP · STRATEGY MODELLED FOR ILLUSTRATION<\u002Fspan>\n      <span>BRIEFING UPDATED {{ updated }}<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1340,&quot;height&quot;:1500},&quot;accentIntensity&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;restrained&quot;,&quot;moderate&quot;],&quot;default&quot;:&quot;restrained&quot;,&quot;tsType&quot;:&quot;'restrained'|'moderate'&quot;},&quot;recommendedStop&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;1-stop&quot;,&quot;2-stop&quot;],&quot;default&quot;:&quot;1-stop&quot;,&quot;tsType&quot;:&quot;'1-stop'|'2-stop'&quot;}}\">\nclass Component extends DCLogic {\n  state = { d:'--', h:'--', m:'--', s:'--' };\n\n  componentDidMount(){\n    this.target = new Date('2026-07-05T15:00:00+01:00').getTime();\n    this.tick();\n    this.timer = setInterval(()=>this.tick(), 1000);\n  }\n  componentWillUnmount(){ if(this.timer) clearInterval(this.timer); }\n\n  tick(){\n    const p = n => String(n).padStart(2,'0');\n    let diff = this.target - Date.now();\n    if(diff <= 0){ this.setState({d:'00',h:'00',m:'00',s:'00'}); return; }\n    this.setState({\n      d: p(Math.floor(diff/86400000)),\n      h: p(Math.floor(diff%86400000/3600000)),\n      m: p(Math.floor(diff%3600000/60000)),\n      s: p(Math.floor(diff%60000/1000))\n    });\n  }\n\n  spark(form){\n    // map finishing positions (1=best) to a thin sparkline in an 84x26 box\n    const W = 84, H = 26, pad = 2, maxP = 14;\n    const pts = form.map((pos,i)=>{\n      const x = pad + (W - pad*2) * (i/(form.length-1));\n      const y = pad + (H - pad*2) * ((pos-1)/(maxP-1));\n      return { x:+x.toFixed(1), y:+y.toFixed(1) };\n    });\n    return {\n      points: pts.map(p=>p.x+','+p.y).join(' '),\n      lastX: pts[pts.length-1].x,\n      lastY: pts[pts.length-1].y\n    };\n  }\n\n  renderVals(){\n    const accentOn = (this.props.accentIntensity ?? 'restrained') === 'moderate';\n    const rec = this.props.recommendedStop ?? '1-stop';\n\n    const raw = [\n      { name:'Norris',     team:'McLaren',      color:'#E07F2A', pts:198, last:'P1',  form:[3,1,2,1,1] },\n      { name:'Verstappen', team:'Red Bull',     color:'#4674AE', pts:187, last:'P2',  form:[1,2,1,4,2] },\n      { name:'Piastri',    team:'McLaren',      color:'#E07F2A', pts:176, last:'P3',  form:[2,3,4,2,3] },\n      { name:'Leclerc',    team:'Ferrari',      color:'#C5343C', pts:142, last:'P4',  form:[5,4,3,6,4] },\n      { name:'Russell',    team:'Mercedes',     color:'#3FB0A0', pts:138, last:'P5',  form:[4,6,5,3,5] },\n      { name:'Hamilton',   team:'Ferrari',      color:'#C5343C', pts:121, last:'P6',  form:[7,5,8,5,6] },\n      { name:'Antonelli',  team:'Mercedes',     color:'#3FB0A0', pts:98,  last:'P8',  form:[6,8,7,9,8] },\n      { name:'Alonso',     team:'Aston Martin', color:'#38886A', pts:67,  last:'P9',  form:[9,7,10,8,9] },\n      { name:'Albon',      team:'Williams',     color:'#4674C4', pts:54,  last:'P7',  form:[8,11,9,12,7] },\n      { name:'Hadjar',     team:'Racing Bulls', color:'#7088C6', pts:41,  last:'P12', form:[12,10,13,11,12] },\n    ];\n\n    const drivers = raw.map((dr,i)=>{\n      const sp = this.spark(dr.form);\n      return {\n        ...dr,\n        posLabel: String(i+1).padStart(2,'0'),\n        spark: sp.points,\n        lastX: sp.lastX,\n        lastY: sp.lastY,\n        sparkColor: accentOn ? dr.color : 'rgba(255,255,255,.5)'\n      };\n    });\n\n    return {\n      ...this.state,\n      drivers,\n      rec1: rec === '1-stop',\n      rec2: rec === '2-stop',\n      updated: '18 JUN · 09:00 UTC'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
