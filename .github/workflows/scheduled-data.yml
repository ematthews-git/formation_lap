name: Scheduled data jobs

# Free fallback path for the scheduler. Mirrors the AWS EventBridge cron table from the plan.
# Each job calls the same `formation-data` CLI that the production ECS task runs.
#
# LIVE: the schedules below fire against the hosted Supabase database via the `DATABASE_URL`
# repo secret. Every job calls the same idempotent `formation-data` CLI, so re-runs outside
# their window are cheap no-ops. To pause the schedules, re-add `if: false` to the `run` job.

on:
  schedule:
    # Weather: daily 06:00 UTC. No-ops until a race is within 10 days, then refreshes the
    # forecast every day as it firms up.
    - cron: "0 6 * * *"
    # Monday 06:00 UTC: post-race (results + standings + fastest lap for last weekend) then
    # prelim sim (only fires on the Monday of a race week).
    - cron: "0 6 * * MON"
    # Post-session poll: hourly across race-weekend days (+ early Monday for late-tz races).
    # Each fire runs run-post-session, which idempotently saves any session that ended ≥45
    # min ago and runs the postquali sim once Qualifying is done. No-ops cheaply otherwise.
    - cron: "0 * * * FRI,SAT,SUN"
    - cron: "0 0-5 * * MON"
    # Pre-season: 15 January 06:00 UTC.
    - cron: "0 6 15 1 *"
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run (e.g. 'run-weather', 'run-pre-season --season 2026')"
        required: true
        default: "run-post-session"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --package formation-data

      - name: Dispatch based on schedule
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # GitHub puts the matched cron into github.event.schedule. Pick the command from
          # there; for workflow_dispatch use the input verbatim.
          case "${{ github.event.schedule }}" in
            "0 6 * * *")
              uv run --package formation-data formation-data run-weather
              ;;
            "0 6 * * MON")
              uv run --package formation-data formation-data run-post-race
              uv run --package formation-data formation-data run-prelim
              ;;
            "0 * * * FRI,SAT,SUN"|"0 0-5 * * MON")
              uv run --package formation-data formation-data run-post-session
              ;;
            "0 6 15 1 *")
              # Adjust the season once a year, or trigger manually via workflow_dispatch.
              uv run --package formation-data formation-data run-pre-season --season "$(date +%Y)"
              ;;
            *)
              uv run --package formation-data formation-data ${{ github.event.inputs.command }}
              ;;
          esac
