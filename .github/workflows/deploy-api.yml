name: Deploy API

# Builds the API image and rolls it out to the VM — but only when something that
# actually changes the image is pushed. formation-api bundles formation-data and
# formation-sim, so a change to any of those three (or the lockfile / this
# workflow) rebuilds; a web-only or docs-only push is skipped entirely.
on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "packages/data/**"
      - "packages/sim/**"
      - "uv.lock"
      - "pyproject.toml"
      - ".dockerignore"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch: # manual redeploy / rollback

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/formation-api:latest
            ghcr.io/${{ github.repository_owner }}/formation-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on the VM over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/formation_lap
            git pull --ff-only          # refresh docker-compose.prod.yml / config
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api
            docker image prune -f       # drop dangling images (keeps :sha tags)
